<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Repository Tree Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        button { background: #3498db; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        button:hover { background: #2980b9; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; overflow-x: auto; font-size: 14px; line-height: 1.5; }
        .status { font-size: 13px; color: #27ae60; text-align: center; margin-top: -10px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>📂 リポジトリ・ツリー自動同期ツール</h2>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">ボタンを押すと、GitHubから最新のフォルダ構造をリアルタイムに取得して図示します。</p>
    
    <button onclick="fetchGitHubTree()">⚡ リアルタイムでディレクトリを同期・図示する</button>
    <div id="statusMessage" class="status"></div>
    <pre id="outputTree">ここにツリー図が自動生成されます</pre>
</div>

<script>
async function fetchGitHubTree() {
    const status = document.getElementById('statusMessage');
    const output = document.getElementById('outputTree');
    status.textContent = "⏳ GitHubから最新のディレクトリを取得中...";
    
    // あなたのリポジトリの全てのファイルツリーを再帰的に取得するAPI
    const url = "https://github.com";
    
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('データの取得に失敗しました');
        const data = await response.json();
        
        let tree = {};
        // 取得したファイルパスを解析してオブジェクトに変換
        data.tree.forEach(item => {
            let parts = item.path.split('/');
            let current = tree;
            parts.forEach(part => {
                if (!current[part]) current[part] = {};
                current = current[part];
            });
        });

        // テキスト図にレンダリング
        function render(obj, prefix = '') {
            let result = '';
            const keys = Object.keys(obj);
            keys.forEach((key, index) => {
                const isLast = index === keys.length - 1;
                const isFolder = Object.keys(obj[key]).length > 0;
                const icon = isFolder ? '📂 ' : '📄 ';
                
                result += prefix + (isLast ? '└── ' : '├── ') + icon + key + '\n';
                if (isFolder) {
                    result += render(obj[key], prefix + (isLast ? '    ' : '│   '));
                }
            });
            return result;
        }

        output.textContent = 'integrated-master-hub/\n' + render(tree);
        status.textContent = "✅ 同期が完了しました！";
    } catch (error) {
        output.textContent = "エラー: " + error.message + "\nリポジトリが公開（Public）になっているか確認してください。";
        status.textContent = "";
    }
}
</script>
</body>
</html>
