<script>
const COLORS={
  blue: {fill:'#2a7acc',bg:'#e8f0fe',stroke:'#4a6fc8',text:'#1a3580',muted:'#4a6fc8'},
  green:{fill:'#1a5c2a',bg:'#f0faf2',stroke:'#8ecba0',text:'#1a5c2a',muted:'#4a9c6a'},
  amber:{fill:'#e0a84a',bg:'#fff8ed',stroke:'#e0a84a',text:'#7a4a00',muted:'#c88c20'},
  red:  {fill:'#c84030',bg:'#fde8e8',stroke:'#d4604a',text:'#8c1c10',muted:'#c84030'},
  purple:{fill:'#9b59b6',bg:'#f3eaff',stroke:'#9b59b6',text:'#4a1b6a',muted:'#9b59b6'},
  teal: {fill:'#16a085',bg:'#e0f7f4',stroke:'#16a085',text:'#0a5c4a',muted:'#16a085'},
  gray: {fill:'#b0ab9e',bg:'#f4f1eb',stroke:'#c8c3b5',text:'#7a7568',muted:'#b0ab9e'},
};

function pie(pct,sz,ck){
  const c=COLORS[ck]||COLORS.blue;
  const r=sz/2-2, cx=sz/2, cy=sz/2;
  const inner=r*0.52;
  const fs=sz<=28?6:sz<=36?7:8;
  const angle=(Math.min(pct,99.9)/100)*2*Math.PI;
  const x=cx+r*Math.sin(angle), y=cy-r*Math.cos(angle);
  const large=pct>50?1:0;
  const arc=pct>=99.9
    ?`M${cx},${cy-r} A${r},${r} 0 1,1 ${cx-0.01},${cy-r} Z`
    :`M${cx},${cy} L${cx},${cy-r} A${r},${r} 0 ${large},1 ${x},${y} Z`;
  const label=pct<1?'<1':pct>=99?'99+':Math.round(pct)+'';
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="flex-shrink:0;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${c.bg}" stroke="${c.stroke}" stroke-width="0.8"/>
    <path d="${arc}" fill="${c.fill}" opacity="0.9"/>
    <circle cx="${cx}" cy="${cy}" r="${inner}" fill="#fff"/>
    <text x="${cx}" y="${cy+fs*0.38}" text-anchor="middle" font-family="'DM Mono',monospace" font-size="${fs}" fill="${c.text}" font-weight="500">${label}%</text>
  </svg>`;
}

function rootPieSVG(segments,sz=100){
  const cx=sz/2,cy=sz/2,r=sz/2-4,inner=r*0.42;
  let paths='',angle=0;
  (segments||[]).forEach(s=>{
    const pct=s.pct/100;
    const a0=angle*2*Math.PI, a1=(angle+pct)*2*Math.PI;
    const x0=cx+r*Math.sin(a0),y0=cy-r*Math.cos(a0);
    const x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1);
    const large=pct>0.5?1:0;
    paths+=`<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large},1 ${x1},${y1} Z" fill="${s.color||'#e8e4dc'}" opacity="${s.opacity||0.85}"/>`;
    angle+=pct;
  });
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
    ${paths}
    <circle cx="${cx}" cy="${cy}" r="${inner}" fill="#f4f1eb"/>
  </svg>`;
}

function renderAtlas(data){
  const root=data.root||{};
  const nodes=data.nodes||[];

  let html='';

  html+=`<div style="display:grid;grid-template-columns:auto 1fr;gap:0;margin-bottom:18px;padding-bottom:16px;border-bottom:2px solid #c8c3b5;">`;
  html+=`<div style="display:flex;flex-direction:column;align-items:center;padding:10px 18px 10px 0;border-right:2px solid #c8c3b5;margin-right:18px;">`;
  html+=rootPieSVG(root.segments,100);
  html+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:#7a7568;margin-top:5px;text-align:center;">${root.pctLabel||''}</div></div>`;
  html+=`<div style="display:flex;flex-direction:column;justify-content:center;">`;
  html+=`<div style="font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-0.02em;">${root.name||''}</div>`;
  html+=`<div style="font-size:10px;color:#7a7568;margin-top:2px;">${root.sub||''}</div>`;
  html+=`<div style="font-size:11px;color:#7a7568;line-height:1.7;margin-top:8px;">${root.desc||''}</div>`;
  const tags=(root.tags||[]).map(t=>`<span style="font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;background:${t.bg||'#edeae0'};border:0.5px solid ${t.border||'#c8c3b5'};color:${t.color||'#7a7568'};">${t.label}</span>`).join('');
  if(tags) html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;">${tags}</div>`;
  html+=`</div></div>`;

  html+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:#7a7568;letter-spacing:0.12em;margin-bottom:10px;display:flex;align-items:center;gap:8px;">${data.l1Title||'内訳'}
    <span style="flex:1;height:1px;background:#ddd9cf;display:inline-block;margin-left:8px;"></span></div>`;

  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;">`;

  nodes.forEach(n=>{
    const ck=n.colorKey||'blue';
    const c=COLORS[ck]||COLORS.blue;
    const hasCh=n.children&&n.children.length>0;
    const borderC=hasCh?c.stroke:'#c8c3b5';
    const headBg=hasCh?c.bg:'#edeae0';

    html+=`<div style="border:1px solid ${borderC};border-radius:4px;background:#fff;overflow:hidden;">`;

    html+=`<div style="padding:7px 9px;border-bottom:1px solid #ddd9cf;background:${headBg};display:flex;align-items:center;gap:6px;">`;
    if(n.id) html+=`<span style="font-family:'DM Mono',monospace;font-size:8px;color:#7a7568;">${n.id}</span>`;
    html+=`<span style="font-size:11px;font-weight:500;flex:1;line-height:1.3;">${n.name||''}</span>`;
    html+=`</div>`;

    html+=`<div style="padding:8px 9px;">`;
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">`;
    html+=pie(n.pct||0,44,ck);
    html+=`<div><div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:${c.fill};line-height:1;">${n.value||''}</div>
      <div style="font-family:'DM Mono',monospace;font-size:8px;color:#7a7568;">${n.abs||''}</div></div>`;
    html+=`</div>`;
    if(n.detail) html+=`<div style="font-size:9.5px;color:#7a7568;line-height:1.6;border-top:0.5px solid #ddd9cf;padding-top:5px;">${n.detail}</div>`;

    if(hasCh){
      if(n.childLabel) html+=`<div style="font-family:'DM Mono',monospace;font-size:8px;color:#7a7568;letter-spacing:0.1em;margin-top:8px;margin-bottom:5px;padding-top:5px;border-top:0.5px solid #ddd9cf;">${n.childLabel}</div>`;
      else html+=`<div style="margin-top:6px;padding-top:5px;border-top:0.5px solid #ddd9cf;"></div>`;

      html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:5px;">`;
      n.children.forEach(ch=>{
        const ck2=ch.colorKey||ck;
        const c2=COLORS[ck2]||COLORS.blue;
        const borderC2=ck2==='red'?'#d4604a':ck2==='amber'?'#e0a84a':'#c8c3b5';
        const bgH2=ck2==='red'?'#fde8e8':ck2==='amber'?'#fff8ed':ck2==='green'?'#f0faf2':'#edeae0';

        html+=`<div style="border:0.5px solid ${borderC2};border-radius:3px;background:#fafaf8;overflow:hidden;">`;
        html+=`<div style="background:${bgH2};padding:4px 6px;border-bottom:0.5px solid #ddd9cf;">`;
        if(ch.id) html+=`<span style="font-family:'DM Mono',monospace;font-size:7px;color:#7a7568;">${ch.id}　</span>`;
        html+=`<span style="font-size:9.5px;font-weight:500;line-height:1.25;">${ch.name||''}</span></div>`;
        html+=`<div style="padding:5px 6px;">`;
        html+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">`;
        html+=pie(ch.pct||0,28,ck2);
        html+=`<div><div style="font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:${c2.fill};line-height:1;">${ch.value||''}</div>
          <div style="font-family:'DM Mono',monospace;font-size:7px;color:#7a7568;">${ch.abs||''}</div></div>`;
        html+=`</div>`;
        if(ch.detail) html+=`<div style="font-size:8.5px;color:#7a7568;line-height:1.5;">${ch.detail}</div>`;
        if(ch.tags&&ch.tags.length){
          const tgs=ch.tags.map(t=>{
            const tc=t.color==='red'?{bg:'#fde8e8',bc:'#d4604a',tx:'#8c1c10'}:t.color==='amber'?{bg:'#fff8ed',bc:'#e0a84a',tx:'#7a4a00'}:t.color==='green'?{bg:'#f0faf2',bc:'#8ecba0',tx:'#1a5c2a'}:{bg:'#edeae0',bc:'#c8c3b5',tx:'#7a7568'};
            return `<span style="font-family:'DM Mono',monospace;font-size:7px;padding:1px 4px;border-radius:2px;background:${tc.bg};border:0.5px solid ${tc.bc};color:${tc.tx};">${t.label}</span>`;
          }).join('');
          html+=`<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;">${tgs}</div>`;
        }
        html+=`</div></div>`;
      });
      html+=`</div>`;
    }

    html+=`</div></div>`;
  });

  html+=`</div>`;
  return html;
}

async function generateAtlas(){
  const topic=document.getElementById('topic-in').value.trim();
  if(!topic){alert('トピックを入力してください');return;}
  document.getElementById('atlas').innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:20px;font-family:'DM Mono',monospace;font-size:11px;color:#7a7568;">
    <div style="width:14px;height:14px;border:2px solid #ddd9cf;border-top-color:#13120f;border-radius:50%;animation:spin 0.7s linear infinite;"></div>「${topic}」のアトラスを生成中…</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  const prompt=`以下のトピックについて、ナレッジハーネスアトラス形式のJSONを生成してください。

トピック: ${topic}

以下のJSON形式で返してください（コードブロックなし、純粋なJSONのみ）:
{
  "title": "タイトル",
  "l1Title": "L1セクション名",
  "root": {
    "name": "ルート概念名",
    "sub": "補足",
    "desc": "説明文（1〜2文）",
    "pctLabel": "代表パーセント説明",
    "segments": [
      {"pct": 数値, "color": "#hex", "opacity": 0.85, "label": "ラベル"}
    ],
    "tags": [
      {"label": "タグ", "bg": "#hex", "border": "#hex", "color": "#hex"}
    ]
  },
  "nodes": [
    {
      "id": "L1·①",
      "name": "ノード名",
      "pct": 数値,
      "value": "表示値",
      "abs": "補足説明",
      "detail": "詳細（1文）",
      "colorKey": "blue|green|amber|red|purple|teal|gray",
      "childLabel": "子セクション名",
      "children": [
        {
          "id": "①-A",
          "name": "子ノード名",
          "pct": 数値,
          "value": "表示値",
          "abs": "補足",
          "detail": "詳細（短く）",
          "colorKey": "colorKey",
          "tags": [{"label": "タグ", "color": "red|amber|green|blue|"}]
        }
      ]
    }
  ]
}

rules:
- L1ノードは3〜6個、各ノードのpct合計は100
- 子ノードは2〜4個、子のpct合計は100
- colorKey: 禁忌→red, 注意→amber, 推奨→green, 標準→blue, 希少→teal, その他→gray
- 日本語で記述、JSONのみ出力`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages:[{role:'user',content:prompt}]})
    });
    const d=await res.json();
    const text=(d.content||[]).map(b=>b.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const data=JSON.parse(clean);
    document.getElementById('atlas').innerHTML=renderAtlas(data);
    document.getElementById('h-title').textContent=topic;
    document.getElementById('st').textContent=`生成済 · ${topic}`;
  }catch(e){
    document.getElementById('atlas').innerHTML=`<div style="padding:20px;font-family:'DM Mono',monospace;font-size:11px;color:#c84030;">エラー: ${e.message}</div>`;
  }
}
