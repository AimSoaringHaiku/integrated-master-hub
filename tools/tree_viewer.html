<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Repository Tree Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        button:hover { background: #27ae60; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; overflow-x: auto; font-size: 14px; line-height: 1.5; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📂 リポジトリ・ツリー自動描画ツール</h2>
    <p style="font-size:13px; color:#666;">GitHubのファイル一覧（またはファイルパスの箇条書き）を貼り付けてください：</p>
    <textarea id="inputData" placeholder="index.html&#10;rx_cockpit.html&#10;data/entresto_market.json&#10;data/biosimilar_data.json&#10;sub/old_version.html"></textarea>
    <button onclick="generateTree()">⚡ ボタン一つで図示する</button>
    <pre id="outputTree" style="display:none;"></pre>
</div>

<script>
function generateTree() {
    const lines = document.getElementById('inputData').value.split('\n').filter(l => l.trim() !== '');
    let tree = {};
    
    // パスを解析してオブジェクトツリーを構築
    lines.forEach(line => {
        let parts = line.replace(/^\.\//, '').split('/');
        let current = tree;
        parts.forEach(part => {
            if (!current[part]) current[part] = {};
            current = current[part];
        });
    });

    // オブジェクトツリーをテキスト図に変換
    function render(obj, prefix = '') {
        let result = '';
        const keys = Object.keys(obj);
        keys.forEach((key, index) => {
            const isLast = index === keys.length - 1;
            const isFolder = Object.keys(obj[key]).length > 0;
            const icon = isFolder ? '📂 ' : '📄 ';
            
            result += prefix + (isLast ? '└── ' : '├── ') + icon + key + '\n';
            if (isFolder) {
                result += render(obj[key], prefix + (isLast ? '    ' : '│   '));
            }
        });
        return result;
    }

    const output = document.getElementById('outputTree');
    output.textContent = 'root/\n' + render(tree);
    output.style.display = 'block';
}
</script>
</body>
</html>
